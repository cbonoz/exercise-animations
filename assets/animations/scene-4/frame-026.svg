<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<rect width="400" height="300" fill="#0f0f1a"/>
<line x1="20" y1="260" x2="380" y2="260" stroke="#444" stroke-width="3" stroke-linecap="round"/>
<text x="200" y="23" fill="#888" font-size="12" font-family="sans-serif" text-anchor="middle">Dead Bugs</text>
<text x="200" y="38" fill="#666" font-size="10" font-family="sans-serif" text-anchor="middle">Lie on back, extend opposite arm & leg toward floor</text>
<!-- Ghost -->
<g stroke="#555" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.25">
  <circle cx="100" cy="65" r="13" fill="#444" stroke="none"/>
  <line x1="113" y1="72" x2="130" y2="90"/>
  <line x1="130" y1="90" x2="170" y2="105"/>
  <line x1="130" y1="90" x2="178" y2="60"/><line x1="178" y1="60" x2="190" y2="42"/>
  <line x1="130" y1="90" x2="82" y2="55"/><line x1="82" y1="55" x2="70" y2="38"/>
  <line x1="170" y1="105" x2="165" y2="165"/><line x1="165" y1="165" x2="155" y2="196"/>
  <line x1="170" y1="105" x2="185" y2="168"/><line x1="185" y1="168" x2="195" y2="200"/>
</g>
<!-- Active -->
<g stroke="#FFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="100" cy="65" r="13" fill="#FFF" stroke="none"/>
  <line x1="113" y1="72" x2="130" y2="90"/>
  <line x1="130" y1="90" x2="170" y2="105"/>
  <!-- Right arm (extends down) -->
  <line x1="130" y1="90" x2="203.599451303155" y2="98.39917695473251"/>
  <line x1="203.599451303155" y1="98.39917695473251" x2="228.39917695473252" y2="93.19890260631001"/>
  <!-- Left arm (stays up) -->
  <line x1="130" y1="90" x2="82" y2="55"/><line x1="82" y1="55" x2="70" y2="38"/>
  <!-- Left leg (extends down) -->
  <line x1="170" y1="105" x2="133.00068587105625" y2="196.99931412894375"/>
  <line x1="133.00068587105625" y1="196.99931412894375" x2="116.60082304526749" y2="227.99931412894375"/>
  <!-- Right leg (stays up) -->
  <line x1="170" y1="105" x2="185" y2="168"/><line x1="185" y1="168" x2="195" y2="200"/>
  <!-- Highlights -->
  <line x1="130" y1="90" x2="203.599451303155" y2="98.39917695473251" stroke="#8B5CF6" stroke-width="5" opacity="0.6"/>
  <line x1="203.599451303155" y1="98.39917695473251" x2="228.39917695473252" y2="93.19890260631001" stroke="#8B5CF6" stroke-width="5" opacity="0.6"/>
  <line x1="170" y1="105" x2="133.00068587105625" y2="196.99931412894375" stroke="#8B5CF6" stroke-width="5" opacity="0.6"/>
  <line x1="133.00068587105625" y1="196.99931412894375" x2="116.60082304526749" y2="227.99931412894375" stroke="#8B5CF6" stroke-width="5" opacity="0.6"/>
</g>
<text x="230" y="87.99931412894375" fill="#8B5CF6" font-size="10" font-family="sans-serif">Extend arm</text>
<text x="125" y="239.19958847736626" fill="#8B5CF6" font-size="10" font-family="sans-serif">Extend leg</text>
</svg>