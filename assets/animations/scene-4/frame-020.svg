<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<rect width="400" height="300" fill="#0f0f1a"/>
<line x1="20" y1="260" x2="380" y2="260" stroke="#444" stroke-width="3" stroke-linecap="round"/>
<text x="200" y="23" fill="#888" font-size="12" font-family="sans-serif" text-anchor="middle">Dead Bugs</text>
<text x="200" y="38" fill="#666" font-size="10" font-family="sans-serif" text-anchor="middle">Lie on back, extend opposite arm & leg toward floor</text>
<!-- Ghost -->
<g stroke="#555" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.25">
  <circle cx="100" cy="65" r="13" fill="#444" stroke="none"/>
  <line x1="113" y1="72" x2="130" y2="90"/>
  <line x1="130" y1="90" x2="170" y2="105"/>
  <line x1="130" y1="90" x2="178" y2="60"/><line x1="178" y1="60" x2="190" y2="42"/>
  <line x1="130" y1="90" x2="82" y2="55"/><line x1="82" y1="55" x2="70" y2="38"/>
  <line x1="170" y1="105" x2="165" y2="165"/><line x1="165" y1="165" x2="155" y2="196"/>
  <line x1="170" y1="105" x2="185" y2="168"/><line x1="185" y1="168" x2="195" y2="200"/>
</g>
<!-- Active -->
<g stroke="#FFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="100" cy="65" r="13" fill="#FFF" stroke="none"/>
  <line x1="113" y1="72" x2="130" y2="90"/>
  <line x1="130" y1="90" x2="170" y2="105"/>
  <!-- Right arm (extends down) -->
  <line x1="130" y1="90" x2="196.1673525377229" y2="87.25102880658437"/>
  <line x1="196.1673525377229" y1="87.25102880658437" x2="217.25102880658437" y2="78.33470507544583"/>
  <!-- Left arm (stays up) -->
  <line x1="130" y1="90" x2="82" y2="55"/><line x1="82" y1="55" x2="70" y2="38"/>
  <!-- Left leg (extends down) -->
  <line x1="170" y1="105" x2="142.29080932784638" y2="187.70919067215362"/>
  <line x1="142.29080932784638" y1="187.70919067215362" x2="127.74897119341563" y2="218.70919067215362"/>
  <!-- Right leg (stays up) -->
  <line x1="170" y1="105" x2="185" y2="168"/><line x1="185" y1="168" x2="195" y2="200"/>
  <!-- Highlights -->
  <line x1="130" y1="90" x2="196.1673525377229" y2="87.25102880658437" stroke="#8B5CF6" stroke-width="5" opacity="0.6"/>
  <line x1="196.1673525377229" y1="87.25102880658437" x2="217.25102880658437" y2="78.33470507544583" stroke="#8B5CF6" stroke-width="5" opacity="0.6"/>
  <line x1="170" y1="105" x2="142.29080932784638" y2="187.70919067215362" stroke="#8B5CF6" stroke-width="5" opacity="0.6"/>
  <line x1="142.29080932784638" y1="187.70919067215362" x2="127.74897119341563" y2="218.70919067215362" stroke="#8B5CF6" stroke-width="5" opacity="0.6"/>
</g>
<text x="230" y="78.70919067215364" fill="#8B5CF6" font-size="10" font-family="sans-serif">Extend arm</text>
<text x="125" y="233.6255144032922" fill="#8B5CF6" font-size="10" font-family="sans-serif">Extend leg</text>
</svg>