<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<rect width="400" height="300" fill="#0f0f1a"/>
<line x1="20" y1="255" x2="380" y2="255" stroke="#444" stroke-width="3" stroke-linecap="round"/>
<text x="200" y="23" fill="#888" font-size="12" font-family="sans-serif" text-anchor="middle">Clamshell</text>
<text x="200" y="38" fill="#666" font-size="10" font-family="sans-serif" text-anchor="middle">Lie on side, keep feet together, open top knee</text>
<!-- Ghost -->
<g stroke="#555" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.25">
  <circle cx="80" cy="80" r="12" fill="#444" stroke="none"/>
  <line x1="92" y1="85" x2="105" y2="100"/>
  <line x1="105" y1="100" x2="130" y2="125"/>
  <line x1="105" y1="100" x2="138" y2="95"/><line x1="138" y1="95" x2="155" y2="90"/>
  <line x1="130" y1="125" x2="155" y2="170"/><line x1="155" y1="170" x2="170" y2="250"/>
  <line x1="130" y1="125" x2="150" y2="175"/><line x1="150" y1="175" x2="165" y2="250"/>
</g>
<!-- Active -->
<g stroke="#FFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="80" cy="80" r="12" fill="#FFF" stroke="none"/>
  <line x1="92" y1="85" x2="105" y2="100"/>
  <line x1="105" y1="100" x2="130" y2="125"/>
  <line x1="105" y1="100" x2="138" y2="95"/><line x1="138" y1="95" x2="155" y2="90"/>
  <!-- Bottom leg (stays) -->
  <line x1="130" y1="125" x2="155" y2="170"/><line x1="155" y1="170" x2="170" y2="250"/>
  <!-- Top leg (knee opens) -->
  <line x1="130" y1="125" x2="178.40749314128942" y2="150.65072016460906"/>
  <line x1="178.40749314128942" y1="150.65072016460906" x2="165" y2="250"/>
  <!-- Highlight top leg -->
  <line x1="130" y1="125" x2="178.40749314128942" y2="150.65072016460906" stroke="#FFD93D" stroke-width="5" opacity="0.6"/>
  <line x1="178.40749314128942" y1="150.65072016460906" x2="165" y2="250" stroke="#FFD93D" stroke-width="5" opacity="0.6"/>
</g>
<!-- Arc showing knee opening -->
<path d="M 150 165 Q 172.02910665294925 139.88357338820302 162.84074931412894 125.82536008230453" stroke="#FFD93D" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
<text x="188.02910665294925" y="131.88357338820302" fill="#FFD93D" font-size="10" font-family="sans-serif">Open</text>
</svg>