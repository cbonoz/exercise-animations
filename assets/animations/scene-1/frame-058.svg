<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<rect width="400" height="300" fill="#0f0f1a"/>
<!-- Floor -->
<line x1="20" y1="210" x2="380" y2="210" stroke="#444" stroke-width="3" stroke-linecap="round"/>
<text x="200" y="23" fill="#888" font-size="12" font-family="sans-serif" text-anchor="middle">Hamstring Slide</text>
<text x="200" y="38" fill="#666" font-size="10" font-family="sans-serif" text-anchor="middle">Lie on back, slide heel along floor, return</text>
<!-- Ghost starting position -->
<g stroke="#555" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.25">
  <circle cx="70" cy="130" r="13" fill="#444" stroke="none"/>
  <line x1="83" y1="135" x2="100" y2="145"/>
  <line x1="100" y1="145" x2="160" y2="155"/>
  <line x1="100" y1="145" x2="92" y2="175"/>
  <line x1="160" y1="155" x2="168" y2="208"/><line x1="168" y1="208" x2="188" y2="210"/>
  <line x1="160" y1="155" x2="145" y2="200"/><line x1="145" y1="200" x2="160" y2="210"/>
</g>
<!-- Active figure -->
<g stroke="#FFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="68.35322359396433" cy="128.11796982167354" r="13" fill="#FFF" stroke="none"/>
  <line x1="81.35322359396433" y1="133.11796982167354" x2="98.35322359396433" y2="143.11796982167354"/>
  <line x1="98.35322359396433" y1="143.11796982167354" x2="160" y2="153.11796982167354"/>
  <line x1="98.35322359396433" y1="143.11796982167354" x2="90.35322359396433" y2="173.11796982167354"/>
  <!-- Left leg (bent, stays) -->
  <line x1="160" y1="153.11796982167354" x2="168" y2="208"/><line x1="168" y1="208" x2="188" y2="210"/>
  <!-- Right leg (slides) -->
  <line x1="160" y1="153.11796982167354" x2="164.76131687242798" y2="198.0238683127572"/>
  <line x2="164.76131687242798" x1="198.0548696844993" y1="198.0238683127572" y2="208.0238683127572"/>
  <!-- Highlight sliding leg -->
  <line x1="160" y1="153.11796982167354" x2="164.76131687242798" y2="198.0238683127572" stroke="#FF6B6B" stroke-width="5" opacity="0.6"/>
  <line x2="164.76131687242798" x1="198.0548696844993" y1="198.0238683127572" y2="208.0238683127572" stroke="#FF6B6B" stroke-width="5" opacity="0.6"/>
</g>
<!-- Arrow -->

</svg>