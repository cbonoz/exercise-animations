<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<rect width="400" height="300" fill="#0f0f1a"/>
<!-- Floor -->
<line x1="20" y1="210" x2="380" y2="210" stroke="#444" stroke-width="3" stroke-linecap="round"/>
<text x="200" y="23" fill="#888" font-size="12" font-family="sans-serif" text-anchor="middle">Hamstring Slide</text>
<text x="200" y="38" fill="#666" font-size="10" font-family="sans-serif" text-anchor="middle">Lie on back, slide heel along floor, return</text>
<!-- Ghost starting position -->
<g stroke="#555" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.25">
  <circle cx="70" cy="130" r="13" fill="#444" stroke="none"/>
  <line x1="83" y1="135" x2="100" y2="145"/>
  <line x1="100" y1="145" x2="160" y2="155"/>
  <line x1="100" y1="145" x2="92" y2="175"/>
  <line x1="160" y1="155" x2="168" y2="208"/><line x1="168" y1="208" x2="188" y2="210"/>
  <line x1="160" y1="155" x2="145" y2="200"/><line x1="145" y1="200" x2="160" y2="210"/>
</g>
<!-- Active figure -->
<g stroke="#FFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="63.0162037037037" cy="122.01851851851852" r="13" fill="#FFF" stroke="none"/>
  <line x1="76.01620370370371" y1="127.01851851851852" x2="93.01620370370371" y2="137.0185185185185"/>
  <line x1="93.01620370370371" y1="137.0185185185185" x2="160" y2="147.0185185185185"/>
  <line x1="93.01620370370371" y1="137.0185185185185" x2="85.01620370370371" y2="167.0185185185185"/>
  <!-- Left leg (bent, stays) -->
  <line x1="160" y1="147.0185185185185" x2="168" y2="208"/><line x1="168" y1="208" x2="188" y2="210"/>
  <!-- Right leg (slides) -->
  <line x1="160" y1="147.0185185185185" x2="228.80555555555554" y2="191.61944444444444"/>
  <line x2="228.80555555555554" x1="272.77314814814815" y1="191.61944444444444" y2="201.61944444444444"/>
  <!-- Highlight sliding leg -->
  <line x1="160" y1="147.0185185185185" x2="228.80555555555554" y2="191.61944444444444" stroke="#FF6B6B" stroke-width="5" opacity="0.6"/>
  <line x2="228.80555555555554" x1="272.77314814814815" y1="191.61944444444444" y2="201.61944444444444" stroke="#FF6B6B" stroke-width="5" opacity="0.6"/>
</g>
<!-- Arrow -->
<line x1="200" y1="235" x2="301.90277777777777" y2="235" stroke="#FFD93D" stroke-width="2" stroke-dasharray="4,3"/>
<polygon points="301.90277777777777,230 311.90277777777777,235 301.90277777777777,240" fill="#FFD93D"/>
<text x="230" y="228" fill="#FFD93D" font-size="10" text-anchor="middle" font-family="sans-serif">Slide</text>
</svg>