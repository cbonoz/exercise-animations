<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<rect width="400" height="300" fill="#0f0f1a"/>
<!-- Floor -->
<line x1="20" y1="210" x2="380" y2="210" stroke="#444" stroke-width="3" stroke-linecap="round"/>
<text x="200" y="23" fill="#888" font-size="12" font-family="sans-serif" text-anchor="middle">Hamstring Slide</text>
<text x="200" y="38" fill="#666" font-size="10" font-family="sans-serif" text-anchor="middle">Lie on back, slide heel along floor, return</text>
<!-- Ghost starting position -->
<g stroke="#555" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.25">
  <circle cx="70" cy="130" r="13" fill="#444" stroke="none"/>
  <line x1="83" y1="135" x2="100" y2="145"/>
  <line x1="100" y1="145" x2="160" y2="155"/>
  <line x1="100" y1="145" x2="92" y2="175"/>
  <line x1="160" y1="155" x2="168" y2="208"/><line x1="168" y1="208" x2="188" y2="210"/>
  <line x1="160" y1="155" x2="145" y2="200"/><line x1="145" y1="200" x2="160" y2="210"/>
</g>
<!-- Active figure -->
<g stroke="#FFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="69.79415294924554" cy="129.7647462277092" r="13" fill="#FFF" stroke="none"/>
  <line x1="82.79415294924554" y1="134.7647462277092" x2="99.79415294924554" y2="144.7647462277092"/>
  <line x1="99.79415294924554" y1="144.7647462277092" x2="160" y2="154.7647462277092"/>
  <line x1="99.79415294924554" y1="144.7647462277092" x2="91.79415294924554" y2="174.7647462277092"/>
  <!-- Left leg (bent, stays) -->
  <line x1="160" y1="154.7647462277092" x2="168" y2="208"/><line x1="168" y1="208" x2="188" y2="210"/>
  <!-- Right leg (slides) -->
  <line x1="160" y1="154.7647462277092" x2="147.47016460905348" y2="199.75298353909466"/>
  <line x2="147.47016460905348" x1="177.88185871056243" y1="199.75298353909466" y2="209.75298353909466"/>
  <!-- Highlight sliding leg -->
  <line x1="160" y1="154.7647462277092" x2="147.47016460905348" y2="199.75298353909466" stroke="#FF6B6B" stroke-width="5" opacity="0.6"/>
  <line x2="147.47016460905348" x1="177.88185871056243" y1="199.75298353909466" y2="209.75298353909466" stroke="#FF6B6B" stroke-width="5" opacity="0.6"/>
</g>
<!-- Arrow -->
<line x1="200" y1="235" x2="261.23508230452677" y2="235" stroke="#FFD93D" stroke-width="2" stroke-dasharray="4,3"/>
<polygon points="261.23508230452677,230 271.23508230452677,235 261.23508230452677,240" fill="#FFD93D"/>
<text x="230" y="228" fill="#FFD93D" font-size="10" text-anchor="middle" font-family="sans-serif">Slide</text>
</svg>