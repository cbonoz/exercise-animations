<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<rect width="400" height="300" fill="#0f0f1a"/>
<!-- Floor -->
<line x1="20" y1="210" x2="380" y2="210" stroke="#444" stroke-width="3" stroke-linecap="round"/>
<text x="200" y="23" fill="#888" font-size="12" font-family="sans-serif" text-anchor="middle">Hamstring Slide</text>
<text x="200" y="38" fill="#666" font-size="10" font-family="sans-serif" text-anchor="middle">Lie on back, slide heel along floor, return</text>
<!-- Ghost starting position -->
<g stroke="#555" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.25">
  <circle cx="70" cy="130" r="13" fill="#444" stroke="none"/>
  <line x1="83" y1="135" x2="100" y2="145"/>
  <line x1="100" y1="145" x2="160" y2="155"/>
  <line x1="100" y1="145" x2="92" y2="175"/>
  <line x1="160" y1="155" x2="168" y2="208"/><line x1="168" y1="208" x2="188" y2="210"/>
  <line x1="160" y1="155" x2="145" y2="200"/><line x1="145" y1="200" x2="160" y2="210"/>
</g>
<!-- Active figure -->
<g stroke="#FFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="69.9951989026063" cy="129.99451303155007" r="13" fill="#FFF" stroke="none"/>
  <line x1="82.9951989026063" y1="134.99451303155007" x2="99.9951989026063" y2="144.99451303155007"/>
  <line x1="99.9951989026063" y1="144.99451303155007" x2="160" y2="154.99451303155007"/>
  <line x1="99.9951989026063" y1="144.99451303155007" x2="91.9951989026063" y2="174.99451303155007"/>
  <!-- Left leg (bent, stays) -->
  <line x1="160" y1="154.99451303155007" x2="168" y2="208"/><line x1="168" y1="208" x2="188" y2="210"/>
  <!-- Right leg (slides) -->
  <line x1="160" y1="154.99451303155007" x2="145.0576131687243" y2="199.99423868312758"/>
  <line x2="145.0576131687243" x1="175.06721536351165" y1="199.99423868312758" y2="209.99423868312758"/>
  <!-- Highlight sliding leg -->
  <line x1="160" y1="154.99451303155007" x2="145.0576131687243" y2="199.99423868312758" stroke="#FF6B6B" stroke-width="5" opacity="0.6"/>
  <line x2="145.0576131687243" x1="175.06721536351165" y1="199.99423868312758" y2="209.99423868312758" stroke="#FF6B6B" stroke-width="5" opacity="0.6"/>
</g>
<!-- Arrow -->

</svg>